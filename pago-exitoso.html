<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pago Exitoso | Filtro Vehicular</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/media/logopwa.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1a9e4a 0%, #25d366 50%, #1ebe5d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            max-width: 380px;
            width: 92%;
            text-align: center;
            overflow: hidden;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .card-body { padding: 40px 24px 32px; }
        .icon-circle {
            width: 64px; height: 64px;
            background: #25d366;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
        }
        .icon-circle i { font-size: 28px; color: #fff; }
        h1 { font-size: 22px; font-weight: 700; color: #111b21; margin-bottom: 8px; }
        p { font-size: 13px; color: #6b7280; line-height: 1.6; margin-bottom: 24px; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: #111b21;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn:hover { background: #1f2c34; }
        .redirect-text {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-body">
            <div class="icon-circle">
                <i class="fa-solid fa-check"></i>
            </div>
            <h1>Pago Exitoso</h1>
            <p>Tu pago fue procesado correctamente.<br>Los creditos se acreditaron a tu cuenta de forma automatica.</p>
            <a href="index.html" class="btn">Volver a la Plataforma</a>
            <p class="redirect-text">Redirigiendo en <span id="countdown">5</span> segundos...</p>
        </div>
    </div>
    <script>
        var seconds = 5;
        var el = document.getElementById('countdown');
        var timer = setInterval(function() {
            seconds--;
            el.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = 'index.html';
            }
        }, 1000);
    </script>
</body>
</html>
