<!-- MODAL DE IMPRESIÓN -->
<div id="printModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999999; align-items: center; justify-content: center; padding: 20px;">
    <div style="background: white; width: 100%; max-width: 900px; max-height: 90vh; overflow-y: auto; border-radius: 12px; position: relative;">
        <div style="padding: 20px; border-bottom: 2px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: white; z-index: 10;">
            <h3 style="margin: 0; color: #111b21; font-size: 18px;">Vista Previa de Impresión</h3>
            <button onclick="cerrarPrintModal()" style="background: transparent; border: none; font-size: 24px; color: #94a3b8; cursor: pointer; padding: 0; width: 32px; height: 32px;">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div id="printContent" style="padding: 40px;"></div>
    </div>
</div>

<style>
    /* Estilos para el contenido de impresión */
    .print-header {
        text-align: center;

        padding-bottom: 20px;
        border-bottom: 3px solid #111b21;
    }

    .print-logo {
        margin-bottom: 12px;
    }

        font-size: 28px;

        color: #111b21;

        letter-spacing: 0.5px;

    .print-subtitle {

        margin: 0;
    }

    .print-info-bar {
        display: flex;
        justify-content: space-between;
        padding: 15px 20px;
        background: #f8fafc;
        border-radius: 8px;
        margin-bottom: 25px;
        font-size: 14px;
        color: #334155;
    }

    .print-verdict {
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 30px;
    }

    .print-verdict h2 {
        font-size: 18px;
        font-weight: 800;
    }

    .print-verdict p {
        font-size: 14px;
        line-height: 1.6;
    }

    .print-section {
        margin-bottom: 30px;
    }

    .print-section h3 {
        font-size: 16px;
        font-weight: 800;
        color: #111b21;
        margin: 0 0 15px 0;
        padding-bottom: 8px;
        border-bottom: 2px solid #e2e8f0;
    }

    .print-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
    }

    .print-table thead {
        background: #f8fafc;
    }

    .print-table th {
        padding: 12px;
        font-size: 12px;
        font-weight: 700;
        color: #475569;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-bottom: 2px solid #e2e8f0;

        padding: 12px;

    }

    .status-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.3px;
    }

    .print-category {
        margin-bottom: 20px;
        border: 1px solid #e2e8f0;

        overflow: hidden;
    }

    .category-header {
        padding: 15px 20px;
        background: #f8fafc;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .category-header h4 {
        font-size: 14px;
        font-weight: 800;
    }

    .category-status {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;

    .category-content {

    .category-content p {
        margin: 0;

    .print-footer {

        text-align: center;
        color: #94a3b8;
        font-size: 11px;
    }

    .print-footer p {
        margin: 5px 0;
    }

    /* ESTILOS PARA IMPRESIÓN REAL */
    @media print {
        /* Ocultar todo excepto el contenido de impresión */
        body * {
            visibility: hidden;
        }

        #printModal,
        #printModal * {
            visibility: visible;
        }

        #printModal {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            background: white !important;
            padding: 0 !important;
        }

        #printModal > div {
            max-width: 100% !important;
            max-height: none !important;
            border-radius: 0 !important;
            box-shadow: none !important;
        }

        /* Ocultar botón de cerrar y header del modal */
        #printModal > div > div:first-child {
            display: none !important;
        }

        #printContent {
            padding: 20mm !important;
        }

        /* Ajustes de página */
        @page {
            size: A4;
            margin: 15mm;
        }

        /* Evitar saltos de página dentro de elementos */
        .print-category,
        .print-verdict,
        .print-info-bar {
            page-break-inside: avoid;
        }

        /* Forzar salto de página antes de secciones importantes */
        .print-section {
            page-break-before: auto;
        }

        /* Mejorar contraste para impresión */
        .print-header h1 {
            color: #000 !important;
        }

        .print-table th {
            background: #f0f0f0 !important;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        /* Asegurar que los colores de estado se impriman */
        .status-badge,
        .print-verdict,
        .category-header {
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        /* Optimizar fuentes para impresión */
        body {
            font-family: 'Roboto', Arial, sans-serif;
        }
    }

    /* Estilos adicionales para botones */
    .btn-imprimir {
        background: #111b21;
        color: #ffffff;
    }

    .btn-imprimir:hover {
        background: #15324d;
        transform: translateY(-1px);
    }

    .btn-descargar {
        background: #25d366;
    }

    .btn-descargar:hover {
        background: #7cb342;
    }
</style>
